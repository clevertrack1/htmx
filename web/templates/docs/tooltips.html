{{ define "tooltips" }}
<article class="mt-3 mb-5 pb-5" id="tooltips">
	<div class="bd-heading align-self-start mb-3 mt-xl-0 mb-xl-2">
		<h3>Tooltips</h3>
		<a class="d-flex align-items-center"
			href="https://getbootstrap.com/docs/5.3/components/tooltips/">Documentation</a>
	</div>

	<div>
		<div class="bd-example-snippet bd-code-snippet">
			<div class="bd-example m-0 border-0 tooltip-demo">

				<button type="button" class="btn btn-secondary mt-2" data-bs-toggle="tooltip" data-bs-placement="top"
					title="Tooltip on top">Tooltip on top</button>
				<button type="button" class="btn btn-secondary mt-2" data-bs-toggle="tooltip" data-bs-placement="right"
					title="Tooltip on end">Tooltip on end</button>
				<button type="button" class="btn btn-secondary mt-2" data-bs-toggle="tooltip" data-bs-placement="bottom"
					title="Tooltip on bottom">Tooltip on bottom</button>
				<button type="button" class="btn btn-secondary mt-2" data-bs-toggle="tooltip" data-bs-placement="left"
					title="Tooltip on start">Tooltip on start</button>
				<button type="button" class="btn btn-secondary mt-2" data-bs-toggle="tooltip" data-bs-html="true"
					title="<em>Tooltip</em> <u>with</u> <b>HTML</b>">Tooltip with
					HTML</button>
			</div>
		</div>
	</div>
</article>

<script>
	function initTooltips() {
		const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
		const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
	}
	initTooltips();
	document.addEventListener('htmx:afterSwap', () => {
		initTooltips();
	});
</script>
{{ end }}
